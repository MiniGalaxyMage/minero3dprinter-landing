<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Shield/badge background -->
  <path
    d="M32 4L8 14v18c0 14 10.5 24.5 24 28 13.5-3.5 24-14 24-28V14L32 4z"
    fill="#1A1A2E"
    stroke="#D4A017"
    stroke-width="1.5"
  />
  <!-- Pickaxe icon -->
  <g transform="translate(32,30)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
    <!-- Pickaxe head -->
    <path
      d="M-10 -6 Q-6 -12 0 -10 Q6 -12 10 -6 Q6 -4 0 -6 Q-6 -4 -10 -6z"
      fill="#D4A017"
      stroke="#D4A017"
      stroke-width="0.5"
    />
    <!-- Pickaxe handle -->
    <line x1="0" y1="-6" x2="4" y2="8" stroke="#008B8B" stroke-width="2.5" />
  </g>
  <!-- Helmet brim -->
  <path
    d="M20 36 Q32 32 44 36"
    stroke="#D4A017"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
  />
  <!-- 3D text hint -->
  <text
    x="32"
    y="50"
    text-anchor="middle"
    font-family="'Orbitron', sans-serif"
    font-size="7"
    font-weight="900"
    fill="#008B8B"
    letter-spacing="1"
  >3D</text>
</svg>
